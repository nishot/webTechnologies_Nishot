<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Modern Login Form</title>
</head>
<body>

<div class="container">
    <div id="choose">
        <div class="choose-option">
            <p>New here?</p>
            <button id="signup" class="btn-toggle">Sign up</button>
        </div>
        <div class="choose-option">
            <p>Existing User?</p>
            <button id="login" class="btn-toggle">Login</button>
        </div>
    </div>

    <div id="form_main_login" style="display: none;" class="form-card">
        <h2>Welcome Back</h2>
        <form id="loginform">
            <div class="input-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>

            <button type="button" class="btn-primary" onclick="login()">Login</button>
        </form>
    </div>

    <div id="form_main_sign_up" style="display: none;" class="form-card">
        <h2>Create Account</h2>
        <form id="signupform">
            <div class="input-group">
                <label for="fullname">Full Name:</label>
                <input type="text" placeholder="Full Name">
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" placeholder="example@gmail.com">
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" placeholder="Enter a secure password">
            </div>

            <div class="input-group gender-group">
                <label>Gender:</label>
                <label class="radio-label"><input type="radio" name="gender" value="Male"> Male</label>
                <label class="radio-label"><input type="radio" name="gender" value="Female"> Female</label>
            </div>

            <div class="input-group">
                <label for="exerciseLevel">Select Your Car:</label>
                <select id="exerciseLevel">
                    <option value="">Select a car model</option>
                    <option value="Bugati">Bugati</option>
                    <option value="Ferrari">Ferrari</option>
                    <option value="Lamborghini">Lamborghini</option>
                </select>
            </div>

            <div class="input-group checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the terms and conditions</label>
            </div>

            <div class="button-group">
                <button type="button" class="btn-primary" onclick="display()">Submit</button>
                <button id="Reset" type="reset" class="btn-secondary">Reset</button>
            </div>
        </form>
    </div>

    <div id="display" class="output-box">No data submitted yet.</div>
</div>

<script src="main.js" defer></script>
</body>
</html>
