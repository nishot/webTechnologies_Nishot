<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
    <div class="resultarea">
    <div id="result"></div>
    </div>
    <div class="button">
    <button id="numberbut" onclick="appender('7'),display()">7</button>
    <button id="numberbut" onclick="appender('8'),display()">8</button>
    <button id="numberbut" onclick="appender('9'),display()">9</button>
    <button id="numberbut" onclick="appender('+'),display()"  style="background: #ff9f0a;">+</button>
    <button id="numberbut" onclick="appender('4'),display()">4</button>
    <button id="numberbut" onclick="appender('5'),display()">5</button>
    <button id="numberbut" onclick="appender('6'),display()">6</button>
    <button id="numberbut" onclick="appender('-'),display()"  style="background: #ff9f0a;">-</button>
    <button id="numberbut" onclick="appender('1'),display()">1</button>
    <button id="numberbut" onclick="appender('2'),display()">2</button>
    <button id="numberbut" onclick="appender('3'),display()">3</button>
     <button id="numberbut" onclick="appender('*'),display()"  style="background: #ff9f0a;">&#215;</button>
    <button id="clear" onclick="resclear()">C</button>
    <button id="numberbut" onclick="appender('0'),display()" >0</button>
    <button id="numberbut" onclick="appender('.'),display()">.</button>
    

   
    <button id="numberbut" onclick="appender('/'),display()"  style="background: #ff9f0a;">&divide;</button>
    <button id="operator" value="=" onclick="calculate()"  style="background: #ff9f0a; grid-column: span 2;width: 100%;border-radius: 50px;padding-left: 25px;text-align: left;">=</button>
    </div>
    </div>
    <script src="script.js" defer></script>
</body> 
</html>
